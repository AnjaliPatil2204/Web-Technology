<!DOCTYPE html>
<html>
<head>
    <title>Result Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }

        .container {
            background: white;
            width: 450px;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Result Calculator</h2>

    <input type="text" id="name" placeholder="Enter Student Name"><br>
    <input type="number" id="subjectCount" placeholder="Enter Number of Subjects"><br>

    <button onclick="generateFields()">Generate Subjects</button>

    <div id="subjects"></div>

    <button onclick="calculateResult()">Calculate</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
