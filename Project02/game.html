<!DOCTYPE html>
<html>
<head>
    <title>Guess The Number</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }

        .container {
            background: white;
            width: 400px;
            padding: 20px;
            margin: 80px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 8px;
            width: 60%;
            margin-top: 10px;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Guess The Number (1 - 100)</h2>

    <input type="number" id="guess" placeholder="Enter your guess"><br>
    <button onclick="checkGuess()">Submit</button>

    <div id="message"></div>
    <div id="attempts"></div>
</div>

<script src="script.js"></script>

</body>
</html>
